scalar BigInt

enum TokenType {
  FEE
  STANDARD
}

type Tokens {
  id: ID!
  token: String!
  name: String!
  symbol: String!
  totalSupply: BigInt!
  decimalPlaces: BigInt!
  owner: String!
  tokenType: TokenType!
  createdAt: BigInt!
  fee: BigInt
  transferTax: BigInt
}

type PlatformStats {
  id: ID!
  totalTokens: BigInt!
  totalTokenLockers: BigInt!
  totalLPLockers: BigInt!
  totalSales: BigInt!
}

type Lock {
  id: ID!
  token: String!
  owner: String!
  lockingAmount: BigInt!
  lockTimeEnd: BigInt!
  projectImageUrl: String!
  createdAt: BigInt!
  lockAddress: String!
}

enum PresaleStatus {
  ACTIVE
  FINALIZED
}

type Presale {
  id: ID!
  saleAddress: String!
  saleOwner: String!
  token: String!
  createdAt: BigInt!
  status: PresaleStatus!
  startTime: BigInt
  endTime: BigInt
  softCap: BigInt
  hardCap: BigInt
  maxBuy: BigInt
  totalTokensForSale: BigInt
  totalTokensForLiquidity: BigInt
  liquidityBPS: BigInt
  salesJson: String
  totalSold: BigInt
  liquidityAmount: BigInt
  treasuryAmount: BigInt
}

type PresalePurchase {
  id: ID!
  saleAddress: String!
  buyer: String!
  ethAmount: BigInt!
  createdAt: BigInt!
}

input LockWhereInput {
  owner: StringWhereInput
  lockAddress: StringWhereInput
}

input PresaleWhereInput {
  saleAddress: StringWhereInput
  saleOwner: StringWhereInput
  status: PresaleStatusWhereInput
}

input PresalePurchaseWhereInput {
  saleAddress: StringWhereInput
  buyer: StringWhereInput
}

input PresaleStatusWhereInput {
  _eq: PresaleStatus
}

type Query {
  PlatformStats: PlatformStats
  Tokens(
    where: TokensWhereInput
    order_by: TokensOrderByInput
    limit: Int
  ): [Tokens!]!
  Lock(where: LockWhereInput): [Lock!]!
  Presale(
    where: PresaleWhereInput
    order_by: PresaleOrderByInput
    limit: Int
  ): [Presale!]!
  PresalePurchase(
    where: PresalePurchaseWhereInput
    order_by: PresalePurchaseOrderByInput
    limit: Int
  ): [PresalePurchase!]!
}

input TokensWhereInput {
  owner: StringWhereInput
}

input StringWhereInput {
  _eq: String
}

input TokensOrderByInput {
  createdAt: OrderDirection
}

input PresaleOrderByInput {
  createdAt: OrderDirection
}

input PresalePurchaseOrderByInput {
  createdAt: OrderDirection
}

enum OrderDirection {
  asc
  desc
}
