query GetPlatformStats {
  PlatformStats {
    totalTokens
    totalTokenLockers
    totalLPLockers
    totalSales
  }
}

query GetRecentTokens {
  Tokens(order_by: { createdAt: desc }, limit: 3) {
    id
    token
    name
    symbol
    totalSupply
    decimalPlaces
    owner
    tokenType
    createdAt
    fee
    transferTax
  }
}

query GetUserTokens($owner: String!) {
  Tokens(where: { owner: { _eq: $owner } }) {
    id
    token
    name
    symbol
    totalSupply
    decimalPlaces
    owner
    tokenType
    createdAt
    fee
    transferTax
  }
}

query GetUserLocks($owner: String!) {
  Lock(where: { owner: { _eq: $owner } }) {
    id
    token
    owner
    lockingAmount
    lockTimeEnd
    projectImageUrl
    createdAt
    lockAddress
  }
}

query GetLock($lockAddress: String!) {
  Lock(where: { lockAddress: { _eq: $lockAddress } }) {
    id
    token
    owner
    lockingAmount
    lockTimeEnd
    projectImageUrl
    createdAt
    lockAddress
  }
}

query GetAllPresales {
  Presale(order_by: { createdAt: desc }) {
    id
    saleAddress
    saleOwner
    token
    createdAt
    status
    startTime
    endTime
    softCap
    hardCap
    maxBuy
    totalTokensForSale
    totalTokensForLiquidity
    liquidityBPS
    salesJson
    totalSold
    liquidityAmount
    treasuryAmount
  }
}

query GetPresale($saleAddress: String!) {
  Presale(where: { saleAddress: { _eq: $saleAddress } }) {
    id
    saleAddress
    saleOwner
    token
    createdAt
    status
    startTime
    endTime
    softCap
    hardCap
    maxBuy
    totalTokensForSale
    totalTokensForLiquidity
    liquidityBPS
    salesJson
    totalSold
    liquidityAmount
    treasuryAmount
  }
}

query GetPresalesByOwner($owner: String!) {
  Presale(where: { saleOwner: { _eq: $owner } }, order_by: { createdAt: desc }) {
    id
    saleAddress
    saleOwner
    token
    createdAt
    status
    startTime
    endTime
    softCap
    hardCap
    maxBuy
    totalTokensForSale
    totalTokensForLiquidity
    liquidityBPS
    salesJson
    totalSold
    liquidityAmount
    treasuryAmount
  }
}

query GetPresalePurchases($saleAddress: String!) {
  PresalePurchase(where: { saleAddress: { _eq: $saleAddress } }, order_by: { createdAt: desc }) {
    id
    saleAddress
    buyer
    ethAmount
    createdAt
  }
}

query GetUserPresalePurchases($buyer: String!) {
  PresalePurchase(where: { buyer: { _eq: $buyer } }, order_by: { createdAt: desc }) {
    id
    saleAddress
    buyer
    ethAmount
    createdAt
  }
}
